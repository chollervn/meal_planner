# Server Configuration
server.port=8081

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Application Name
spring.application.name=Meal Planner VIP

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/meal_planner?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=root
spring.datasource.password=Phamquan31@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JSON Configuration (avoid infinite loop when serialize)
spring.jackson.serialization.fail-on-empty-beans=false

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:ZGVtb19qd3Rfc2VjcmV0X2tleV9zaG91bGRfYmVfY2hhbmdlZF9pbl9wcm9kXzEyMzQ1Njc4OTA=}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Multipart upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
