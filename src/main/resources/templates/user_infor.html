<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - BMI Meal Planner</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/user_profile.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">BMI Meal Planner</div>
    <div class="nav-menu">
        <a>Thông tin cá nhân</a>
        <a>Thực đơn của tôi</a>
        <a>Thực đơn mẫu</a>
        <a class="logout">Đăng xuất</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <div class="profile-box">

        <!-- LEFT: USER INFO -->
        <div class="card">
            <h2>👤 Thông tin cá nhân</h2>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" value="user@email.com" disabled>
            </div>

            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="userName" placeholder="Nhập họ tên">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Tuổi</label>
                    <input type="number" id="userAge" placeholder="Nhập tuổi">
                </div>

                <div class="form-group">
                    <label>Chiều cao (cm)</label>
                    <input type="number" id="userHeight" placeholder="Nhập chiều cao">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Cân nặng (kg)</label>
                    <input type="number" id="userWeight" placeholder="Nhập cân nặng">
                </div>

                <div class="form-group">
                    <label>BMI</label>
                    <input type="text" id="userBMI" value="Nhập chiều cao và cân nặng" disabled>
                </div>
            </div>

            <button class="save-btn">Lưu thông tin</button>
        </div>

        <!-- RIGHT: AVATAR -->
        <div class="card avatar-box">
            <h2>📸 Ảnh đại diện</h2>

            <div class="avatar">👤</div>

            <button class="upload-btn">Tải ảnh lên</button>
            <p class="hint">PNG / JPG • tối đa 5MB</p>
        </div>

    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script src="/js/user_profile.js"></script>

</body>
</html>
