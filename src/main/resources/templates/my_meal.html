<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch áp thực đơn - BMI Meal Planner</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/my_meal.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">BMI Meal Planner</div>
    <div class="nav-menu">
        <a>Thông tin cá nhân</a>
        <a>Thực đơn của tôi</a>
        <a>Thực đơn mẫu</a>
        <a class="logout">Đăng xuất</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="calendar-header">
        <h1>📅 Lịch áp thực đơn</h1>

        <div class="controls">
            <select id="yearSelect" aria-label="Chọn năm"></select>

            <select id="monthSelect" aria-label="Chọn tháng"></select>

            <button id="prevWeekBtn" type="button">◀ Tuần trước</button>
            <button id="nextWeekBtn" type="button">Tuần sau ▶</button>
        </div>
    </div>

    <!-- CALENDAR GRID -->
    <div class="calendar"></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script src="/js/my_meal.js"></script>

</body>
</html>
